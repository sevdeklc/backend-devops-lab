spring:
  application:
    name: task-manager-api

  datasource:
    url: jdbc:postgresql://postgres:5432/task_manager_db
    username: task_user
    password: task_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080